name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-port:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run Python tests
        run: cd port/python && uv sync && uv run pytest tests/ -v

  rust-port:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cd port/rust && cargo test

  # Parity tests: will be activated when both Python and Rust ports have
  # working CLI binaries that can be compared against each other.
  parity-tests:
    runs-on: ubuntu-latest
    needs: [python-port, rust-port]
    steps:
      - name: Placeholder for parity tests
        run: echo "parity tests will run once ports produce binaries"
